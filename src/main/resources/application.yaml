spring:
  application:
    name: sentrix-core

  datasource:
    url: jdbc:mysql://localhost:3308/sentrix?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    time-zone: Asia/Seoul

server:
  port: 8081

sentrix:
  demo-server:
    actuator-url: http://localhost:8080/actuator/prometheus

  prometheus:
    base-url: http://localhost:9090

  model-server:
    base-url: http://localhost:8000

  diagnosis:
    window-size-seconds: 60
    step-size-seconds: 10
    threshold: 0.2716
    schema-version: v1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.sentrix: DEBUG
    org.hibernate.SQL: DEBUG