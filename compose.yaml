services:
  sentrix-core-db:
    image: mysql:8.0
    container_name: sentrix-core-db
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: sentrix
    volumes:
      - sentrix_core_db_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  sentrix_core_db_data:
